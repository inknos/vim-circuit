name: Deploy vimdoc to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['doc/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build vimdoc HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate HTML from vimdoc
        uses: tsuyoshicho/action-vimhelp-html-generate@v1
        env:
          FOLDER: build
          BACKGROUND: light
          COLORSCHEME: github

      - name: Create index.html
        run: |
          cd build
          if [ -f claudeterm.html ]; then
            cp claudeterm.html index.html
          elif [ -f claudeterm.txt.html ]; then
            cp claudeterm.txt.html index.html
          else
            # Fall back to first HTML file found
            first=$(ls *.html 2>/dev/null | head -1)
            if [ -n "$first" ] && [ "$first" != "index.html" ]; then
              cp "$first" index.html
            fi
          fi
          ls -la

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

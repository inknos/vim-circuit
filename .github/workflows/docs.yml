name: Deploy vimdoc to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build vimdoc HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: tsuyoshicho/action-vimhelp-html-generate@v1
        env:
          FOLDER: build
          BACKGROUND: light
          COLORSCHEME: github

      - name: Use help file as index
        run: |
          sudo chown -R $(id -u):$(id -g) build/
          cp build/claudeterm.html build/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
